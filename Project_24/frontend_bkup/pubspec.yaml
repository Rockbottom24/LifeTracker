name: lifetracker
version: 1.0.0+1
publish_to: 'none'

description: Offline-first life tracking app skeleton.

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  flutter_local_notifications: ^17.0.3
  dio: ^5.8.0
  shared_preferences: ^2.0.0
  provider: ^6.1.2

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/translations/

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
