spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lifetracker}
    username: ${SPRING_DATASOURCE_USERNAME:ramesh}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true

logging:
  level:
    root: INFO
    com.lifetracker: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

lifetracker:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-key-change-before-production-32chars}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:5173,http://localhost:8080,http://localhost:8081}
