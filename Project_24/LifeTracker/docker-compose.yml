services:
  postgres:
    image: postgres:16-alpine
    container_name: lifetracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lifetracker}
      POSTGRES_USER: ${POSTGRES_USER:-lifetracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lifetracker} -d ${POSTGRES_DB:-lifetracker}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lifetracker-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lifetracker}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-lifetracker}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      LOG_DIR: /var/log/lifetracker
      SERVER_PORT: 8080
    volumes:
      - backend-logs:/var/log/lifetracker
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  nginx:
    build:
      context: .
      dockerfile: deployment/nginx/Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL:-/api/v1}
    container_name: lifetracker-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - frontend-logs:/var/log/nginx

volumes:
  postgres-data:
  backend-logs:
  frontend-logs:
